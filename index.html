<!DOCTYPE html>
<html lang="en" data-color-scheme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale / user-scalable=no: native pinch-zoom must stay available for
         low-vision users (Lighthouse a11y). Touch inputs are lifted to 16px in the globals
         so iOS doesn't auto-zoom on focus. The in-app zoom control is a separate convenience. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Light-default fallback; ThemeProvider updates this at runtime to track the user's scheme. -->
    <meta name="theme-color" content="#f6f5f1" />
    <title>Keyboard Notes</title>
    <meta
      name="description"
      content="A practice notebook for people learning an instrument — notes, engraved staves you can hear, chord charts, recordings, and sheet-music PDFs in one lesson."
    />
    <!-- Scalable sticker favicon; raster app-icon links are injected at build by
         vite-plugin-pwa from public/icon-detailed.png. `sizes="any"` marks the SVG
         as resolution-independent so browsers prefer it over the build-injected
         favicon.ico (sizes="48x48") even for tiny 16px tab icons. -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/icons/icon-simple.svg" />
    <!-- Fonts are self-hosted (public/fonts/) and declared via @font-face in
         ThemeProvider.globals.css — no render-blocking external request. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
