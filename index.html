<!DOCTYPE html>
<html lang="en" data-color-scheme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Light-default fallback; ThemeProvider updates this at runtime to track the user's scheme. -->
    <meta name="theme-color" content="#f6f5f1" />
    <title>Keyboard Notes</title>
    <meta
      name="description"
      content="A practice notebook for people learning an instrument — notes, engraved staves you can hear, chord charts, recordings, and sheet-music PDFs in one lesson."
    />
    <!-- Scalable sticker favicon; raster app-icon links are injected at build by
         vite-plugin-pwa from public/icon-detailed.png -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-simple.svg" />
    <!-- Fonts are self-hosted (public/fonts/) and declared via @font-face in
         ThemeProvider.globals.css — no render-blocking external request. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
