name: Regenerate Tool Screenshots

# Manual-only. Rebuilds the per-tool install screenshots (the manifest carousel) by driving the
# built app with Playwright on CI's Linux/Chromium, then commits any changes straight back to main.
#
# CI is the source of truth for these PNGs: rendering (font hinting, antialiasing) differs from a
# local macOS run, so regenerate here rather than locally to avoid churn. Lesson screenshots are
# hand-captured and untouched by this job.
on:
  workflow_dispatch:

# Need write access to push the regenerated PNGs back to main.
permissions:
  contents: write

# Don't race a deploy or another regen; let an in-flight run finish.
concurrency:
  group: screenshots
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The screenshot script builds first; the maskable/shortcut icons and subset fonts are
      # gitignored, so regenerate them so the built app renders with its real art (same as deploy).
      - name: Generate assets
        run: npm run assets

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # `npm run screenshots` = vite build + scripts/generate-tool-screenshots.mjs, which writes
      # public/screenshots/tool-<id>-<wide|narrow>.png.
      - name: Regenerate screenshots
        run: npm run screenshots

      # Commit straight to main with [skip ci] so the resulting push doesn't retrigger the deploy
      # workflow (which runs on push to main). If nothing changed, this is a no-op.
      - name: Commit regenerated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate tool screenshots [skip ci]"
          git push
