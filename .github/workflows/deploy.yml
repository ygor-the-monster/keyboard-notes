name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Run the bundled JS actions on Node 24 (silences the Node 20 deprecation notice).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Chromium (for browser tests)
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      # Recompose the maskable PWA icon from its source layers so the deployed
      # icon always matches public/icons/icon-fg.png + public/icons/icon-bg.png.
      - name: Generate maskable icon
        run: npm run icons:maskable

      # Re-subset the self-hosted fonts from the originals in fonts/ into public/fonts/,
      # then fail if the committed output drifted (originals changed without rebuilding).
      - name: Build fonts
        run: |
          npm run fonts:build
          git diff --exit-code public/fonts \
            || { echo "::error::public/fonts is stale — run 'npm run fonts:build' and commit."; exit 1; }

      - name: Build
        run: npm run build

      # Lighthouse CI — report-only baseline (assertions are warn-level, never fail the
      # build) so we can watch the trend before tightening into hard gates. continue-on-error
      # keeps a flaky run from blocking the deploy; the report URL is printed in the logs.
      - name: Lighthouse CI
        continue-on-error: true
        run: npx lhci autorun

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
