name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Chromium (for browser tests)
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      # Regenerate the gitignored assets from their committed sources before building, so dist
      # always carries fresh art: the maskable icon (from icons/icon-fg.png + icon-bg.png), the
      # shortcut icons (Phosphor glyphs on accent tiles), and the subset fonts (from fonts/).
      # Tool/lesson screenshots stay committed, so they're already in public/.
      - name: Generate assets
        run: npm run assets

      - name: Build
        run: npm run build

      # Lighthouse CI — report-only baseline (assertions are warn-level, never fail the
      # build) so we can watch the trend before tightening into hard gates. continue-on-error
      # keeps a flaky run from blocking the deploy; the report URL is printed in the logs.
      - name: Lighthouse CI
        continue-on-error: true
        run: npx lhci autorun

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
