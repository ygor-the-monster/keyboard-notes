name: Regenerate KB Index

# Manual-only (like the screenshots workflow). Rebuilds the music tutor's retrieval index
# (public/kb-index.json) from the sources in src/prompts/kb/, then commits any change back to main.
# Run it from the Actions tab after changing KB sources or the build script. Kept off the push
# trigger so it never races a contributor who already committed a freshly-built index.
on:
  workflow_dispatch:

# Need write access to push the regenerated index back to main.
permissions:
  contents: write

# Don't race a deploy or another regen; let an in-flight run finish.
concurrency:
  group: kb-index
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Embeds src/prompts/kb/*.md into public/kb-index.json (downloads the embedding model on first
      # run from the HF hub).
      - name: Regenerate KB index
        run: npm run kb:index

      # Commit straight to main with [skip ci] so the resulting push doesn't retrigger the deploy
      # workflow (which runs on push to main). If nothing changed, this is a no-op.
      - name: Commit regenerated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/kb-index.json
          if git diff --cached --quiet; then
            echo "No KB index changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate KB index [skip ci]"
          git push
